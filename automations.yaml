- id: '1647920016422'
  alias: Pico Remote Bed Frame
  description: ''
  use_blueprint:
    path: stephack/core-pico.yaml
    input:
      auto_mode: restart
      bottom_off:
      - service: light.turn_off
        data: {}
        target:
          area_id:
          - master_bedroom
          - master_bathroom
          - closet
      - delay:
          hours: 1
          minutes: 0
          seconds: 0
          milliseconds: 0
      - service: input_boolean.turn_on
        data: {}
        target:
          entity_id: input_boolean.bedroom_motion_sensor_state
      top_on:
      - service: scene.turn_on
        target:
          entity_id: scene.bedroom_lights
        metadata: {}
      - service: input_boolean.turn_on
        data: {}
        target:
          entity_id: input_boolean.bedroom_motion_sensor_state
      pico_remote: d33322b65c2f71efd842ebfee2272dc4
      mode_max: 8
      middle_stop:
      - service: scene.turn_on
        target:
          entity_id: scene.master_bedroom_reading
        metadata: {}
      - delay:
          hours: 1
          minutes: 0
          seconds: 0
          milliseconds: 0
      - service: input_boolean.turn_on
        data: {}
        target:
          entity_id: input_boolean.bedroom_motion_sensor_state
      down_raise:
      - service: input_boolean.turn_on
        data: {}
        target:
          entity_id: input_boolean.is_pico_down_held
      - repeat:
          while:
          - condition: state
            entity_id: input_boolean.is_pico_down_held
            state: 'on'
          sequence:
          - service: media_player.volume_down
            data: {}
            target:
              entity_id: media_player.bedroom_sonos
      down_lower:
      - service: input_boolean.turn_on
        data: {}
        target:
          entity_id: input_boolean.is_pico_down_held
      - repeat:
          while:
          - condition: state
            entity_id: input_boolean.is_pico_down_held
            state: 'on'
          sequence:
          - service: media_player.volume_down
            data: {}
            target:
              entity_id: media_player.bedroom_sonos
          - delay:
              hours: 0
              minutes: 0
              seconds: 0
              milliseconds: 150
      middle_stop_release:
      - service: media_player.shuffle_set
        data:
          shuffle: true
        target:
          entity_id: media_player.bedroom_sonos
      - service: media_player.play_media
        data:
          media_content_type: playlist
          enqueue: replace
          media_content_id: https://open.spotify.com/playlist/5FmmxErJczcrEwIFGIviYo?si=c0716743e2314117
        target:
          entity_id: media_player.bedroom_sonos
      - service: input_boolean.turn_off
        data: {}
        target:
          entity_id: input_boolean.bedroom_motion_sensor_state
      up_raise:
      - service: input_boolean.turn_on
        data: {}
        target:
          entity_id: input_boolean.is_pico_up_held
      - repeat:
          while:
          - condition: state
            entity_id: input_boolean.is_pico_up_held
            state: 'on'
          sequence:
          - service: media_player.volume_up
            data: {}
            target:
              entity_id: media_player.bedroom_sonos
          - delay:
              hours: 0
              minutes: 0
              seconds: 0
              milliseconds: 150
      up_lower:
      - service: input_boolean.turn_off
        data: {}
        target:
          entity_id: input_boolean.is_pico_up_held
      bottom_off_release:
      - service: media_player.media_pause
        data: {}
        target:
          device_id: 62b4389f3b5b909f36ce07fe53905f01
      - service: input_boolean.turn_off
        data: {}
        target:
          entity_id: input_boolean.bedroom_motion_sensor_state
      - delay:
          hours: 1
          minutes: 0
          seconds: 0
          milliseconds: 0
      - service: input_boolean.turn_on
        data: {}
        target:
          entity_id: input_boolean.bedroom_motion_sensor_state
      up_raise_release:
      - service: input_boolean.turn_off
        data: {}
        target:
          entity_id: input_boolean.is_pico_up_held
      down_lower_release:
      - service: input_boolean.turn_off
